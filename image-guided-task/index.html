<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shape Copy</title>
<style>
  :root{
    --gray-label: #8a8a8a;
    --gray-line: #e3e3e3;
    --board-bg: #ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    background:#ffffff;
    color:#222;
    padding:14px 16px 18px;
  }
  .wrap{max-width:840px;width:100%;margin:0 auto;position:relative;}

  .top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:8px;
    flex-wrap:wrap;
    gap:10px;
  }
  .prompt-label{
    font-size:17px;
    line-height:1.4;
    color:#222;
  }
  .stats{
    font-size:12px;
    color:var(--gray-label);
    text-align:right;
    white-space:nowrap;
  }

  .box-unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
  }
  .box-caption{
    font-size:12px;
    color:var(--gray-label);
  }
  .box{
    background:var(--board-bg);
    border:1px solid var(--gray-line);
    border-radius:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:visible;
  }
  .box svg{overflow:visible;}
  #targetBox{ width:150px; height:150px; }
  #board{ width:150px; height:150px; }

  /* ---- core: target stacked above build, held fixed at the center
     of the pentagon so both stay put while only their contents change ---- */
  .core-stack{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  /* ---- pentagon: fixed geometry, never changes between trials.
     Wraps BOTH the target and the build space together, so the five
     property panels sit around the whole target+yours core. Height
     exceeds width to match the tall core stack, keeping everything
     inside one screen. ---- */
  .pentagon-wrap{
    position:relative;
    width:min(94vw, 720px);
    aspect-ratio:150/132;
    margin:0 auto;
  }
  .pent-slot{
    position:absolute;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    width:150px;
  }
  /* fixed pentagon vertex positions (top, upper-right, lower-right, lower-left, upper-left),
     stretched taller than wide to wrap around the stacked target+build core.
     WHICH property lands in which vertex is randomized fresh each trial in JS --
     these five positions themselves never move. */
  .pent-0{ top:7%;    left:50%;   }
  .pent-1{ top:34%;   left:88%;   }
  .pent-2{ top:85%;   left:75%;   }
  .pent-3{ top:85%;   left:25%;   }
  .pent-4{ top:34%;   left:12%;   }

  .prop-label{
    font-size:12px;
    color:var(--gray-label);
    text-align:center;
  }
  .prop-options{
    display:flex;
    gap:8px;
  }

  .board-actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:12px;
  }
  button.action{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:.02em;
    border:none;
    border-radius:5px;
    padding:8px 18px;
    cursor:pointer;
  }
  button.action:hover{opacity:.85;}
  button.submit{background:#111;color:#fff;}

  .opt{
    background:#fff;
    border:2px solid var(--gray-line);
    border-radius:8px;
    padding:5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:0;
    flex:0 0 auto;
    transition:border-color .15s ease, transform .1s ease;
  }
  .opt svg{width:48px;height:48px;display:block;}
  .opt:hover{transform:translateY(-1px);}
  .opt.selected{border-color:#111;}

  @media (max-width:720px){
    .pentagon-wrap{
      width:100%;
      aspect-ratio:auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      position:static;
    }
    .core-stack{ position:static; transform:none; order:-1; }
    .pent-slot{ position:static; transform:none; width:auto; order:initial; }
  }

  /* motion animations, applied to the inner <g> that wraps the shape.
     transform-origin is set inline per-instance so it always rotates
     about the shape's own center, in board coords or icon coords alike. */
  .m-rotate{ animation: rotateAnim 3s linear infinite; }
  .m-shake{  animation: shakeAnim 0.5s ease-in-out infinite; }

  @keyframes rotateAnim{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  @keyframes shakeAnim{
    0%,100%{transform:rotate(-9deg);}
    50%{transform:rotate(9deg);}
  }

  /* ---- pre-task screens: instructions + sandbox ---- */
  .screen-inner{
    max-width:520px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    text-align:center;
  }
  #instructionsWrap{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .screen-title{ font-size:20px; margin:0; }
  .screen-text{ font-size:15px; line-height:1.65; color:#333; margin:0; }
  .sandbox-progress{ font-size:13px; color:var(--gray-label); margin-top:12px; }
  button.action:disabled{ opacity:.4; cursor:not-allowed; }
  .proceed-slot{ min-height:37px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<!-- Screen 1: task explanation -- holds for the average reading time before the proceed button appears -->
<div class="wrap" id="instructionsWrap">
  <div class="screen-inner">
    <h2 class="screen-title">How this task works</h2>
    <p class="screen-text" id="instructionsText"></p>
    <div class="board-actions proceed-slot">
      <button class="action submit" id="proceedBtn" style="visibility:hidden;" onclick="goToSandbox()">Proceed</button>
    </div>
  </div>
</div>

<!-- Screen 2: sandbox -- try every option at least once before continuing -->
<div class="wrap" id="sandboxWrap" style="display:none;">
  <div class="top">
    <div class="prompt-label">Warm-up</div>
  </div>

  <div class="pentagon-wrap" id="sandboxPentagonWrap">
    <div class="pent-slot pent-0" id="sandbox-prop-slot-0"></div>
    <div class="pent-slot pent-1" id="sandbox-prop-slot-1"></div>
    <div class="pent-slot pent-2" id="sandbox-prop-slot-2"></div>
    <div class="pent-slot pent-3" id="sandbox-prop-slot-3"></div>
    <div class="pent-slot pent-4" id="sandbox-prop-slot-4"></div>

    <div class="core-stack">
      <div class="box-unit">
        <div class="box" id="sandboxBox"></div>
        <div class="box-caption">Preview</div>
      </div>
    </div>
  </div>

  <div class="sandbox-progress" id="sandboxProgress">0 of 10 options tried</div>
  <div class="board-actions">
    <button class="action submit" id="sandboxContinueBtn" disabled onclick="goToTask()">Continue</button>
  </div>
</div>

<!-- Screen 3: the task itself, unchanged -->
<div class="wrap" id="taskWrap" style="display:none;">
  <div class="top">
    <div class="prompt-label">Match this shape:</div>
    <div class="stats" id="statsText"></div>
  </div>

  <div class="pentagon-wrap" id="pentagonWrap">
    <div class="pent-slot pent-0" id="prop-slot-0"></div>
    <div class="pent-slot pent-1" id="prop-slot-1"></div>
    <div class="pent-slot pent-2" id="prop-slot-2"></div>
    <div class="pent-slot pent-3" id="prop-slot-3"></div>
    <div class="pent-slot pent-4" id="prop-slot-4"></div>

    <div class="core-stack">
      <div class="box-unit">
        <div class="box" id="targetBox"></div>
        <div class="box-caption">Target</div>
      </div>
      <div class="box-unit">
        <div class="box" id="board"></div>
        <div class="box-caption">Yours</div>
      </div>
    </div>
  </div>

  <div class="board-actions">
    <button class="action submit" id="submitBtn" onclick="submitTrial()">Submit</button>
  </div>
</div>

<script>
/* ---------------------------------------------------------------
   Config: shapes and the five binary property dimensions.
   This list never changes trial to trial, so its layout (pentagon
   slot, option order) is fixed rather than re-randomized.
---------------------------------------------------------------- */
const SHAPES = ['oval','square','triangle','diamond','star'];

const CATEGORIES = [
  { key:'size',      label:'Size',
    options:[ {id:'small', label:'Small'}, {id:'large', label:'Large'} ] },
  { key:'texture',   label:'Texture',
    options:[ {id:'striped', label:'Striped'}, {id:'dotted', label:'Dotted'} ] },
  { key:'color',     label:'Color',
    options:[ {id:'blue', label:'Blue'}, {id:'yellow', label:'Yellow'} ] },
  { key:'lineWidth', label:'Line Width',
    options:[ {id:'thick', label:'Thick'}, {id:'thin', label:'Thin'} ] },
  { key:'motion',    label:'Motion',
    options:[ {id:'shake', label:'Shaking'}, {id:'rotate', label:'Rotating'} ] }
];

function colorHex(id){
  if(id === 'blue')   return '#2196F3';
  if(id === 'yellow') return '#F5C518';
  if(id === 'black')  return '#111111';
  return '#9a9a9a'; // neutral / not-yet-chosen (used only for the live build, never for icons)
}

function lineWidthPx(id, scale){
  const thick = 7 * scale, thin = 1.3 * scale, def = 4 * scale;
  if(id === 'thick') return thick;
  if(id === 'thin')  return thin;
  return def;
}

/* ---------------------------------------------------------------
   Texture fills: patterns only (never a flat solid fill) so the
   shape always reads as an outline rather than a solid block.
   Dotted is a classic polka-dot pattern -- an evenly spaced grid of
   clearly separated circles, each with visible white space around it.
---------------------------------------------------------------- */
function textureFill(texture, colorId, context){
  if(!texture) return { fill:'none', def:'' };
  const color = colorHex(colorId);
  const id = `pat_${context}_${texture}_${colorId||'neutral'}`;
  let def = '';
  if(texture === 'striped'){
    def = `<pattern id="${id}" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="white"/>
      <rect x="0" width="6" height="12" fill="${color}"/>
    </pattern>`;
  } else if(texture === 'dotted'){
    const w = 20, h = 20, r = 6.6;
    def = `<pattern id="${id}" width="${w}" height="${h}" patternUnits="userSpaceOnUse">
      <rect width="${w}" height="${h}" fill="white"/>
      <circle cx="${w/2}" cy="${h/2}" r="${r}" fill="${color}"/>
    </pattern>`;
  }
  return { fill:`url(#${id})`, def };
}

/* ---------------------------------------------------------------
   Shape geometry. Every shape is drawn from a single circumradius R
   (max distance from center) around (cx,cy), so every shape occupies
   an equal-area rotation-safe footprint and rotating/shaking never
   pushes any shape further from center than R -- regardless of size
   tier or which motion is applied.
---------------------------------------------------------------- */
function starPoints(cx,cy,rOuter,rInner,n=5){
  let pts=[];
  for(let i=0;i<n*2;i++){
    const r = i%2===0 ? rOuter : rInner;
    const a = (Math.PI/n)*i - Math.PI/2;
    pts.push(`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`);
  }
  return pts.join(' ');
}

function regularPolygonPoints(cx,cy,r,n){
  let pts=[];
  for(let i=0;i<n;i++){
    const a = -Math.PI/2 + i*(2*Math.PI/n);
    pts.push(`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`);
  }
  return pts.join(' ');
}

function shapeElement(shape, cx, cy, R, styleAttrs){
  switch(shape){
    case 'oval': {
      const ry = R * 0.62;
      return `<ellipse cx="${cx}" cy="${cy}" rx="${R.toFixed(2)}" ry="${ry.toFixed(2)}" ${styleAttrs}/>`;
    }
    case 'square': {
      const hw = R / Math.SQRT2;
      const rx = Math.max(1, hw*0.11);
      return `<rect x="${(cx-hw).toFixed(2)}" y="${(cy-hw).toFixed(2)}" width="${(hw*2).toFixed(2)}" height="${(hw*2).toFixed(2)}" rx="${rx.toFixed(2)}" ${styleAttrs}/>`;
    }
    case 'triangle': return `<polygon points="${regularPolygonPoints(cx,cy,R,3)}" ${styleAttrs}/>`;
    case 'diamond':  return `<polygon points="${cx},${(cy-R).toFixed(2)} ${(cx+R).toFixed(2)},${cy} ${cx},${(cy+R).toFixed(2)} ${(cx-R).toFixed(2)},${cy}" ${styleAttrs}/>`;
    case 'star':     return `<polygon points="${starPoints(cx,cy,R,R*0.4)}" ${styleAttrs}/>`;
  }
}

// Board/target coordinate system: 200x200 viewBox, center (100,100).
const VIEWBOX_HALF = 100;
const EDGE_PADDING = 12;   // reserves room for the outline ring (drawn fully outside R) + a visual margin
const SAFETY = 2;
const SIZE_SCALE = { small:0.6, default:1.1, large:2.0, iconBaseline:1.5 };
// Both motions (shake, rotate) sweep no further from center than R itself
// (rotating a shape about its own center never changes its max distance
// from that center), so the only thing BASE_RADIUS has to satisfy is that
// the LARGE tier still fits inside the box -- letting "large" be a big,
// confident jump from "small" while staying fully in bounds under motion.
const BASE_RADIUS = (VIEWBOX_HALF - EDGE_PADDING - SAFETY) / SIZE_SCALE.large;

// The pattern fill is drawn at exactly R with NO stroke of its own, and the
// outline is a separate, wider, stroke-only copy of the same shape drawn at
// R + strokeWidth/2 (so the stroke ring spans from R outward to R+strokeWidth).
// That keeps line width purely a property of the outline ring -- it never
// grows/shrinks into the pattern, which always stops exactly at R.
function specToSvg(spec, cx, cy, baseR, context, strokeMultiplier=1){
  const scale = SIZE_SCALE[spec.size] || SIZE_SCALE.default;
  const R = baseR * scale;
  const strokeColor = colorHex(spec.color);
  const strokeWidth = lineWidthPx(spec.lineWidth, baseR / BASE_RADIUS) * strokeMultiplier;
  const fillInfo = textureFill(spec.texture, spec.color, context);

  const fillEl = shapeElement(spec.shape, cx, cy, R, `fill="${fillInfo.fill}" stroke="none"`);
  const outlineR = R + strokeWidth / 2;
  const outlineEl = shapeElement(spec.shape, cx, cy, outlineR, `fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth.toFixed(2)}" stroke-linejoin="round"`);

  const motionClass = spec.motion ? ('m-' + spec.motion) : '';
  return { def: fillInfo.def, shapeSvg: fillEl + outlineEl, motionClass };
}

function renderInto(el, spec, viewBoxSize, cx, cy, baseR, context){
  const { def, shapeSvg, motionClass } = specToSvg(spec, cx, cy, baseR, context);
  el.innerHTML = `
    <svg viewBox="0 0 ${viewBoxSize} ${viewBoxSize}" width="100%" height="100%">
      <defs>${def}</defs>
      <g class="${motionClass}" style="transform-origin:${cx}px ${cy}px;">${shapeSvg}</g>
    </svg>
  `;
}

/* ---------------------------------------------------------------
   Property-option icons: each button shows the *effect* of applying
   that specific option to the current trial's shape, against a plain,
   neutral baseline -- so the icon itself demonstrates the change
   (a genuinely bigger/smaller shape, a genuinely thicker/thinner
   outline, etc.) rather than symbolizing it with an abstract arrow.
---------------------------------------------------------------- */
const ICON_VB = 96;
const ICON_CENTER = 48;
const ICON_BASE_RADIUS = 20;

function iconSvgFor(shape, catKey, optId, context){
  const spec = {
    shape,
    size:'iconBaseline', texture:null,
    color: (catKey === 'color' ? null : 'black'),
    lineWidth:null, motion:null
  };
  spec[catKey] = optId;
  const strokeMultiplier = (catKey === 'color') ? 2 : 1;
  const { def, shapeSvg, motionClass } = specToSvg(spec, ICON_CENTER, ICON_CENTER, ICON_BASE_RADIUS, context, strokeMultiplier);
  return `<svg viewBox="0 0 ${ICON_VB} ${ICON_VB}">
    <defs>${def}</defs>
    <g class="${motionClass}" style="transform-origin:${ICON_CENTER}px ${ICON_CENTER}px;">${shapeSvg}</g>
  </svg>`;
}

function previewIconSvg(catKey, optId){
  return iconSvgFor(state.target.shape, catKey, optId, 'prev_' + catKey + '_' + optId);
}

/* ---------------------------------------------------------------
   State
---------------------------------------------------------------- */
/* ---------------------------------------------------------------
   Stimulus database: every one of the 2^n * m possible target
   combinations (n = CATEGORIES.length binary properties, m =
   SHAPES.length shapes) is generated once, up front, as a fixed list
   -- not sampled randomly trial to trial. Each user gets their own
   shuffled ORDER over this same fixed set, so across a full pass
   every user sees all 160 stimuli exactly once each, just in a
   different (randomized) sequence.
---------------------------------------------------------------- */
function generateStimulusDatabase(){
  let combos = [{}];
  CATEGORIES.forEach(cat=>{
    const next = [];
    combos.forEach(partial=>{
      cat.options.forEach(opt=>{
        next.push({ ...partial, [cat.key]: opt.id });
      });
    });
    combos = next;
  });
  const db = [];
  SHAPES.forEach(shape=>{
    combos.forEach(propCombo=>{
      db.push({ shape, ...propCombo });
    });
  });
  return db; // length === SHAPES.length * 2^CATEGORIES.length
}

const STIMULUS_DB = generateStimulusDatabase();
const TOTAL_POSSIBLE_TRIALS = STIMULUS_DB.length; // 2^n * m

function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// This user's randomized presentation order over the fixed database.
// Reshuffled fresh (a new full pass) each time it's exhausted, so
// coverage is always complete before anything repeats.
let stimulusOrder = shuffle(STIMULUS_DB);
let stimulusIndex = 0;

let state = {
  target: null,
  build: { size:null, texture:null, color:null, lineWidth:null, motion:null },
  trialCount: 0,
  slotOrder: [],      // slotOrder[i] = category key placed in pentagon position i, re-shuffled every trial
  optionOrder: {}      // optionOrder[catKey] = shuffled option-id order, re-shuffled every trial
};

// Unique target combinations seen so far (shape + all 5 property values),
// used to show real coverage progress out of TOTAL_POSSIBLE_TRIALS.
const seenTrials = new Set();
function trialKey(target){
  return [target.shape, ...CATEGORIES.map(cat => target[cat.key])].join('|');
}

function newTrial(){
  if(stimulusIndex >= stimulusOrder.length){
    stimulusOrder = shuffle(STIMULUS_DB);
    stimulusIndex = 0;
  }
  const target = { ...stimulusOrder[stimulusIndex] };
  stimulusIndex += 1;

  state.target = target;
  state.build = { size:null, texture:null, color:null, lineWidth:null, motion:null };
  state.trialCount += 1;
  seenTrials.add(trialKey(target));

  // which pentagon position each property lands in, re-randomized every trial
  state.slotOrder = shuffle(CATEGORIES.map(c=>c.key));
  // order of the two options within each property, re-randomized every trial
  state.optionOrder = {};
  CATEGORIES.forEach(cat=>{
    state.optionOrder[cat.key] = shuffle(cat.options.map(o=>o.id));
  });

  render();
}

function submitTrial(){
  newTrial();
}

function selectOption(catKey, optId){
  state.build[catKey] = state.build[catKey] === optId ? null : optId;
  render();
}

/* ---------------------------------------------------------------
   Rendering. The pentagon's five vertex positions and the box
   sizes/positions are fixed in the markup/CSS above and never move --
   only which property sits in which vertex, and which option comes
   first within a property, are reshuffled by newTrial() each round.
---------------------------------------------------------------- */
function render(){
  renderInto(document.getElementById('targetBox'), state.target, 200, 100, 100, BASE_RADIUS, 'target');
  renderInto(document.getElementById('board'), { shape: state.target.shape, ...state.build }, 200, 100, 100, BASE_RADIUS, 'board');
  renderProperties();
  updateStats();
}

function renderProperties(){
  state.slotOrder.forEach((catKey, i)=>{
    const cat = CATEGORIES.find(c=>c.key === catKey);
    const el = document.getElementById('prop-slot-' + i);
    const order = state.optionOrder[catKey];
    const opts = order.map(optId=>{
      const opt = cat.options.find(o=>o.id === optId);
      const selected = state.build[catKey] === optId;
      return `<button class="opt${selected?' selected':''}" title="${opt.label}" onclick="selectOption('${catKey}','${optId}')">${previewIconSvg(catKey, optId)}</button>`;
    }).join('');
    el.innerHTML = `<div class="prop-label">${cat.label}</div><div class="prop-options">${opts}</div>`;
  });
}

function updateStats(){
  document.getElementById('statsText').textContent =
    `Trial ${state.trialCount} · ${seenTrials.size} of ${TOTAL_POSSIBLE_TRIALS} unique combinations seen`;
}

/* ---------------------------------------------------------------
   Screen 1: task explanation. Holds for roughly the average time it
   takes to silently read the instructions (~200 words per minute)
   before the Proceed button becomes available, so it can't be
   skipped instantly.
---------------------------------------------------------------- */
const TASK_INSTRUCTIONS_TEXT = "Each trial shows a Target shape at the top of the pentagon, with its size, texture, color, line width, and motion set at random. Use the property options arranged around the boxes to recreate it in the Yours box below: choose the matching option for each of the five properties. Once your build matches the target in every property, click Submit to lock it in and move to the next trial.";

function estimateReadingMs(text){
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const AVERAGE_READING_WPM = 200;
  const ms = (words / AVERAGE_READING_WPM) * 60000;
  return Math.max(3000, Math.round(ms));
}

function showInstructions(){
  document.getElementById('instructionsText').textContent = TASK_INSTRUCTIONS_TEXT;
  const btn = document.getElementById('proceedBtn');
  btn.style.visibility = 'hidden';
  setTimeout(()=>{ btn.style.visibility = 'visible'; }, estimateReadingMs(TASK_INSTRUCTIONS_TEXT));
}

function goToSandbox(){
  document.getElementById('instructionsWrap').style.display = 'none';
  document.getElementById('sandboxWrap').style.display = '';
}

/* ---------------------------------------------------------------
   Screen 2: sandbox. A free-play preview box surrounded by the same
   pentagon of property controls used in the real task, unconnected
   to any target -- purely so the user sees what every individual
   option looks like before the real task's scoring begins. "Tried" =
   clicked that specific option (10 total: 5 properties x 2 options
   each). Continue unlocks only once all ten have been clicked.
---------------------------------------------------------------- */
let sandboxState = {
  shape: pickRandom(SHAPES),
  build: { size:null, texture:null, color:null, lineWidth:null, motion:null }
};
const triedOptions = new Set();
const TOTAL_SANDBOX_OPTIONS = CATEGORIES.reduce((n, cat) => n + cat.options.length, 0);

function renderSandbox(){
  renderInto(document.getElementById('sandboxBox'), { shape: sandboxState.shape, ...sandboxState.build }, 200, 100, 100, BASE_RADIUS, 'sandbox');

  CATEGORIES.forEach((cat, i)=>{
    const el = document.getElementById('sandbox-prop-slot-' + i);
    const opts = cat.options.map(opt=>{
      const selected = sandboxState.build[cat.key] === opt.id;
      const ctx = 'sandbox_' + cat.key + '_' + opt.id;
      return `<button class="opt${selected?' selected':''}" title="${opt.label}" onclick="sandboxSelect('${cat.key}','${opt.id}')">${iconSvgFor(sandboxState.shape, cat.key, opt.id, ctx)}</button>`;
    }).join('');
    el.innerHTML = `<div class="prop-label">${cat.label}</div><div class="prop-options">${opts}</div>`;
  });

  updateSandboxProgress();
}

function sandboxSelect(catKey, optId){
  sandboxState.build[catKey] = sandboxState.build[catKey] === optId ? null : optId;
  triedOptions.add(catKey + ':' + optId);
  renderSandbox();
}

function updateSandboxProgress(){
  const n = triedOptions.size;
  document.getElementById('sandboxProgress').textContent = `${n} of ${TOTAL_SANDBOX_OPTIONS} options tried`;
  document.getElementById('sandboxContinueBtn').disabled = n < TOTAL_SANDBOX_OPTIONS;
}

function initSandbox(){
  renderSandbox();
}

/* ---------------------------------------------------------------
   Screen 3: hand off to the task, unchanged from here on.
---------------------------------------------------------------- */
function goToTask(){
  document.getElementById('sandboxWrap').style.display = 'none';
  document.getElementById('taskWrap').style.display = '';
  newTrial();
}

initSandbox();
showInstructions();
</script>
